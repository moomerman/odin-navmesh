name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-libtess2:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: macos-arm64
            artifact: libtess2.a
            cc: cc
            flags: "-c -O2 -arch arm64"
            ar: "ar rcs libtess2.a *.o"
          - os: macos-13
            target: macos-x86_64
            artifact: libtess2.a
            cc: cc
            flags: "-c -O2 -arch x86_64"
            ar: "ar rcs libtess2.a *.o"
          - os: ubuntu-latest
            target: linux-x86_64
            artifact: libtess2.a
            cc: cc
            flags: "-c -O2 -fPIC"
            ar: "ar rcs libtess2.a *.o"
          - os: windows-latest
            target: windows-x86_64
            artifact: libtess2.lib
            cc: cl
            flags: "/c /O2"
            ar: "lib /OUT:libtess2.lib *.obj"

    runs-on: ${{ matrix.os }}
    steps:
      - name: Clone libtess2
        run: git clone --depth 1 https://github.com/memononen/libtess2.git libtess2-src

      - name: Build (Unix)
        if: runner.os != 'Windows'
        working-directory: libtess2-src
        run: |
          ${{ matrix.cc }} ${{ matrix.flags }} -I Include Source/*.c
          ${{ matrix.ar }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        working-directory: libtess2-src
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cl /c /O2 /I Include Source\bucketalloc.c Source\dict.c Source\geom.c Source\mesh.c Source\priorityq.c Source\sweep.c Source\tess.c
          lib /OUT:libtess2.lib *.obj

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libtess2-${{ matrix.target }}
          path: libtess2-src/${{ matrix.artifact }}

  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm lld

      - name: Install Odin
        run: |
          curl -fsSL https://github.com/odin-lang/Odin/releases/latest/download/odin-ubuntu-amd64-nightly+date.tar.gz -o odin.tar.gz || \
          curl -fsSL https://github.com/odin-lang/Odin/releases/download/dev-2024-12/odin-ubuntu-amd64-dev-2024-12.tar.gz -o odin.tar.gz
          mkdir -p odin-install
          tar xzf odin.tar.gz -C odin-install --strip-components=1
          echo "$PWD/odin-install" >> $GITHUB_PATH

      - name: Clone libtess2
        run: git clone --depth 1 https://github.com/memononen/libtess2.git /tmp/libtess2

      - name: Build WASM object
        run: |
          ODIN_ROOT=$(odin root)
          cd /tmp/libtess2
          clang -c -Os --target=wasm32 \
            --sysroot=$ODIN_ROOT/vendor/libc-shim \
            -isystem $GITHUB_WORKSPACE/lib/wasm_shim \
            -I Include \
            Source/*.c \
            $GITHUB_WORKSPACE/lib/wasm_shim/setjmp.c
          wasm-ld -r *.o -o libtess2_wasm.o

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libtess2-wasm
          path: /tmp/libtess2/libtess2_wasm.o

  release:
    needs: [build-libtess2, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release package
        run: |
          mkdir -p release/lib/wasm_shim

          # Nav source files.
          cp nav.odin pathfind.odin tess2.odin nav_wasm.odin release/
          cp nav_test.odin release/

          # Pre-built libraries — platform-specific names.
          cp artifacts/libtess2-macos-arm64/libtess2.a     release/lib/libtess2_darwin_arm64.a
          cp artifacts/libtess2-macos-x86_64/libtess2.a    release/lib/libtess2_darwin_amd64.a
          cp artifacts/libtess2-linux-x86_64/libtess2.a    release/lib/libtess2_linux_amd64.a
          cp artifacts/libtess2-windows-x86_64/libtess2.lib release/lib/libtess2_windows_amd64.lib
          cp artifacts/libtess2-wasm/libtess2_wasm.o       release/lib/libtess2_wasm.o

          # WASM shim.
          cp lib/wasm_shim/setjmp.c lib/wasm_shim/setjmp.h release/lib/wasm_shim/

          # Build instructions and examples.
          cp lib/BUILD.md release/lib/
          cp -r examples release/

          # Create archive.
          cd release
          tar czf ../odin-navmesh-${GITHUB_REF_NAME}.tar.gz .
          cd ..
          cd release && zip -r ../odin-navmesh-${GITHUB_REF_NAME}.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            odin-navmesh-*.tar.gz
            odin-navmesh-*.zip
