name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: macos-arm64
            cc_flags: "-c -O2 -arch arm64"
            lib_name: libtess2_darwin_arm64.a
          - os: ubuntu-latest
            target: linux-x86_64
            cc_flags: "-c -O2 -fPIC"
            lib_name: libtess2_linux_amd64.a
          - os: windows-latest
            target: windows-x86_64
            lib_name: libtess2_windows_amd64.lib

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Odin (Unix)
        if: runner.os != 'Windows'
        run: |
          OS_TAG=""
          if [ "$RUNNER_OS" = "macOS" ]; then
            OS_TAG="macos-arm64"
          else
            OS_TAG="ubuntu-amd64"
          fi
          curl -fsSL "https://github.com/odin-lang/Odin/releases/latest/download/odin-${OS_TAG}-nightly+date.tar.gz" -o odin.tar.gz
          mkdir -p odin-install
          tar xzf odin.tar.gz -C odin-install --strip-components=1
          echo "$PWD/odin-install" >> $GITHUB_PATH

      - name: Install Odin (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/odin-lang/Odin/releases/latest/download/odin-windows-amd64-nightly+date.zip" -OutFile odin.zip
          Expand-Archive odin.zip -DestinationPath odin-install
          $dir = (Get-ChildItem odin-install -Directory | Select-Object -First 1).FullName
          echo "$dir" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Build libtess2 (Unix)
        if: runner.os != 'Windows'
        run: |
          git clone --depth 1 https://github.com/memononen/libtess2.git /tmp/libtess2
          cd /tmp/libtess2
          cc ${{ matrix.cc_flags }} -I Include Source/*.c
          ar rcs libtess2.a *.o
          cp libtess2.a $GITHUB_WORKSPACE/lib/${{ matrix.lib_name }}

      - name: Build libtess2 (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          git clone --depth 1 https://github.com/memononen/libtess2.git %TEMP%\libtess2
          cd %TEMP%\libtess2
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cl /c /O2 /I Include Source\bucketalloc.c Source\dict.c Source\geom.c Source\mesh.c Source\priorityq.c Source\sweep.c Source\tess.c
          lib /OUT:libtess2.lib *.obj
          copy libtess2.lib %GITHUB_WORKSPACE%\lib\${{ matrix.lib_name }}

      - name: Run tests
        run: odin test . -vet -strict-style -vet-semicolon -vet-cast -vet-using-param -vet-shadowing -warnings-as-errors
